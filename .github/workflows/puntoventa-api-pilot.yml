name: PuntoVenta API Pilot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/puntoventa-api-pilot.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pilot

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Deploy API
        uses: Azure/functions-action@v1
        with:
          app-name: func-puntoventa-pilot-eastus2
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_PUNTOVENTA }}
