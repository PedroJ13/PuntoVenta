name: PuntoVenta Web Pilot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/puntoventa-web-pilot.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pilot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Web
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PUNTOVENTA }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: app
          api_location: ""
          output_location: ""
